        Date de naissance : <input type="text" id="dob" />

    <script type="text/javascript">
        $(document).ready(function () {
            var firstname = $("#firstname").val();
            var lastname = $("#lastname").val();
            var dob = $("#dob").val();
            var age = $("#age").val();
            $($enter).click(function () {
                $.ajax({
                    type: 'POST',
                    url: ".....rest service url....",

                    data: {
                        "firstname": firstname,

                        "dob": dob,
